<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!--
    Xiphias Tech logo icon
    Geometric crystal/swordfish blade with two upper spikes
    and a faceted gem body. Based on brand mockup.
  -->

  <!-- Rotate the whole shape ~30° to point upper-right like the original -->
  <g transform="translate(100, 145) rotate(-25)">

    <!-- RIGHT SPIKE (the "bill" — tallest, pointing up-right) -->
    <polygon points="5,-135 15,-90 -5,-85" fill="#00E5FF"/>

    <!-- LEFT SPIKE (secondary fin, shorter, pointing up-left) -->
    <polygon points="-30,-95 -18,-70 -38,-62" fill="#4DE8FF"/>

    <!-- UPPER CONNECTING FACET (between the two spikes) -->
    <polygon points="-5,-85 15,-90 10,-55 -18,-70" fill="#00D6F0"/>

    <!-- LEFT BODY FACET (upper-left of crystal body) -->
    <polygon points="-18,-70 -38,-62 -50,-25 -25,-15 10,-55" fill="#00E5FF"/>

    <!-- RIGHT BODY FACET (upper-right of crystal body) -->
    <polygon points="10,-55 15,-90 30,-40 35,-5 5,-10" fill="#00CCE0"/>

    <!-- CENTER BODY FACET -->
    <polygon points="-25,-15 10,-55 5,-10" fill="#00D6F0"/>

    <!-- LOWER-RIGHT FACET -->
    <polygon points="5,-10 35,-5 30,35 0,40" fill="#00B8D0"/>

    <!-- LOWER-LEFT FACET -->
    <polygon points="-50,-25 -25,-15 -15,30 -40,20" fill="#00BBCF"/>

    <!-- BOTTOM-CENTER FACET -->
    <polygon points="-25,-15 5,-10 0,40 -15,30" fill="#00A8C0"/>

    <!-- BOTTOM TIP -->
    <polygon points="-15,30 0,40 -10,55 -20,40" fill="#009DB5"/>

    <!-- BOTTOM-RIGHT EXTENSION -->
    <polygon points="0,40 30,35 20,55 -10,55" fill="#009DB5"/>

  </g>
</svg>
